<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Tickets - Artipan</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{background:#f4ede4;font-family:'Segoe UI',Arial,sans-serif;font-size:14px;padding:20px}h1.page-title{text-align:center;color:#67402C;font-size:1.2rem;margin-bottom:18px;letter-spacing:2px}.btn-print{display:block;margin:0 auto 10px;padding:8px 24px;background:#8B4220;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;letter-spacing:1px}.btn-print:hover{background:#67402C}.toolbar{display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}.btn-sel{padding:8px 20px;background:#BE9E7C;color:#3a2010;border:none;border-radius:6px;cursor:pointer;font-size:.85rem}.btn-sel:hover{background:#a98964}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.ticket{position:relative;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(103,64,44,.15);break-inside:avoid;page-break-inside:avoid;transition:opacity .15s}.ticket:not(.selected){opacity:.4}.tk-select{position:absolute;top:19px;right:14px;width:18px;height:18px;cursor:pointer;z-index:2;accent-color:#D3C6B4}.tk-header{background:#67402C;display:flex;align-items:center;gap:10px;padding:10px 14px}.tk-brand{color:#D3C6B4;font-weight:700;font-size:.95rem;letter-spacing:1.5px;flex:1}.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;margin-right:26px}.badge.pend{background:#e67e22;color:#fff}.badge.parc{background:#f1c40f;color:#222}.tk-cliente{font-size:1.25rem;font-weight:700;color:#67402C;padding:12px 14px 2px}.tk-fecha{color:#8B4220;font-size:.85rem;padding:0 14px 10px;border-bottom:1px solid #e8ddd5}.tk-table{width:100%;border-collapse:collapse;margin:10px 0}.tk-table th{background:#f9f4ef;color:#8B4220;padding:5px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e8ddd5}.tk-table td{padding:5px 10px;border-bottom:1px solid #f4ede4;font-size:13px}td.pnombre{color:#333}td.pcant{text-align:center;font-weight:600;color:#8B4220}td.pprecio,td.psub{text-align:right;color:#555}td.psub{font-weight:600;color:#67402C}.tk-totales{padding:8px 14px;border-top:1px solid #e8ddd5;background:#f9f4ef}.tot-row{display:flex;justify-content:space-between;padding:3px 0;color:#555;font-size:13px}.tot-row.total{font-size:1.1rem;font-weight:700;color:#67402C;border-top:1px solid #D3C6B4;margin-top:4px;padding-top:6px}.nota{padding:8px 14px;color:#8B4220;font-size:.82rem;font-style:italic;background:#fff8f0;border-top:1px dashed #D3C6B4}.tk-footer{background:#f4ede4;color:#a09080;font-size:.72rem;text-align:right;padding:5px 12px}@media print{.btn-print{display:none}.toolbar{display:none}.tk-select{display:none}body{background:#fff;padding:10px}.grid{grid-template-columns:repeat(2,1fr);gap:12px}.ticket{box-shadow:none;border:1px solid #ccc;display:none;opacity:1}.ticket.selected{display:block}}@media(max-width:600px){.grid{grid-template-columns:1fr}}</style></head><body><h1 class='page-title'>TICKETS DE PEDIDO</h1><button class='btn-print' onclick='window.print()'>🖨️ Imprimir seleccionados</button><div class='toolbar'><button class='btn-sel' onclick="document.querySelectorAll('.tk-select').forEach(function(c){c.checked=true;c.closest('.ticket').classList.add('selected');})">Seleccionar todos</button><button class='btn-sel' onclick="document.querySelectorAll('.tk-select').forEach(function(c){c.checked=false;c.closest('.ticket').classList.remove('selected');})">Deseleccionar todos</button></div><div class='grid'></div></body></html>
